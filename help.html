<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help | The LevelUp Circle</title>
  <link rel="icon" type="image/png" href="images/bglevelupcircle.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="help.css" />
</head>
<body>
  <main class="help-page">
    <section class="help-section">
      <div class="container">
        <div class="help-topbar">
          <a href="/" class="btn btn-secondary help-back">Back to Home</a>
        </div>

        <div class="help-intro">
          <h1>Contact Support</h1>
          <p>
            Need assistance with access, downloads, or course-related questions?
            Send us your details and we will get back to you soon.
          </p>
        </div>

        <div class="help-grid">
          <article class="help-card">
            <h3>Email Support</h3>
            <p>levelupcircle@gmail.com</p>
          </article>
          <article class="help-card">
            <h3>Typical Response Time</h3>
            <p>Within 24 hours</p>
          </article>
          <article class="help-card">
            <h3>Priority Topic</h3>
            <p>Payment / Access Issues</p>
          </article>
        </div>

        <form id="helpForm" class="help-form" method="post">
          <div class="help-field">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Your full name" required>
          </div>
          <div class="help-field">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="help-field">
            <label for="topic">Topic</label>
            <select id="topic" name="topic" required>
              <option value="">Select a topic</option>
              <option value="payment">Payment issue</option>
              <option value="download">PDF download issue</option>
              <option value="access">Access issue</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="help-field help-field-full">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Write your message..." required></textarea>
          </div>
          <div class="help-actions">
            <button type="submit" class="btn btn-primary">Send Message</button>
          </div>
          <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="help.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
